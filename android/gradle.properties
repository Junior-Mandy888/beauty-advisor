org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=true
org.gradle.workers.max=1
android.useAndroidX=true
android.enableJetifier=true
android.overridePathCheck=true
org.gradle.process.worker=false
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 --add-opens=java.base/java.lang=ALL-UNNAMED
# 禁用 Worker Daemon
org.gradle.workers.isolate=false
org.gradle.workers.fork=false
# 强制不使用fork
org.gradle.child JVM.maxHeapSize=1024m