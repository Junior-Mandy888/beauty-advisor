name: beauty_advisor
description: "美妆穿搭顾问 - 根据脸型、天气、衣橱智能推荐妆容发型穿搭"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  dio: ^5.4.0
  
  # 路由
  go_router: ^13.0.0
  
  # 后端服务
  supabase_flutter: ^2.5.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 图片处理
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # 屏幕适配
  flutter_screenutil: ^5.9.0
  
  # 工具库
  intl: ^0.19.0
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
